<style>

/* RESET */
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

/* BODY */
body {
font-family: Arial;
background: linear-gradient(180deg, #020617, #0f172a);
color: white;
}

/* HEADER */
.header {
display: flex;
justify-content: space-between;
padding: 15px 30px;
background: #020617;
}

.logo {
color: #22c55e;
font-weight: bold;
text-decoration: none;
}

.nav a {
color: white;
margin-left: 20px;
text-decoration: none;
}

.nav a:hover {
color: #22c55e;
}

/* CONTACT */
.contact {
text-align: center;
padding: 80px 20px;
}

.contact h1 {
font-size: 36px;
margin-bottom: 10px;
}

.sub {
color: #94a3b8;
margin-bottom: 30px;
}

/* FORM BOX */
.box {
max-width: 400px;
margin: auto;
background: #020617;
padding: 25px;
border-radius: 12px;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* FORM */
form {
display: flex;
flex-direction: column;
}

/* INPUT */
input, select, textarea {
width: 100%;
padding: 12px;
margin-bottom: 15px;
border-radius: 8px;
border: 1px solid #1e293b;
background: #0f172a;
color: white;
}

textarea {
height: 100px;
}

/* TERMS */
.terms {
font-size: 13px;
margin-bottom: 15px;
}

.terms a {
color: #22c55e;
text-decoration: none;
}

/* BUTTON */
button {
background: linear-gradient(135deg, #22c55e, #16a34a);
padding: 14px;
border: none;
border-radius: 10px;
cursor: pointer;
font-weight: bold;
color: black;
}

button:hover {
opacity: 0.9;
}

/* FOOTER */
footer {
text-align: center;
padding: 20px;
background: #020617;
margin-top: 60px;
}

footer a {
color: #94a3b8;
margin: 10px;
text-decoration: none;
}

footer a:hover {
color: #22c55e;
}

/* MOBILE */
@media(max-width:600px){
.nav {

}
