<body>

<!-- HEADER -->

<div class="header">

<a href="/index.html" class="logo">Adinova PDF</a>

<div class="nav" id="navMenu">

<!-- MAIN -->

<section class="contact-section">

<div class="contact-container">

<!-- LEFT -->

<div class="contact-text">
<h1>Contact Us</h1>
<p>
Have questions, feedback, or need support?  
We're here to help you anytime.
</p>
</div>

<!-- FORM -->

<div class="form-box">

<form action="https://formspree.io/f/mvzvbglo" method="POST">

<input type="hidden" name="_redirect" value="https://adinovapdf.online/thank-you.html">

<div class="form-group">
<label>Your Name*</label>
<input type="text" name="name" placeholder="Your Name" required>
</div>

<div class="form-group">
<label>Your Email*</label>
<input type="email" name="email" placeholder="Your Email" required>
</div>

<div class="form-group">
<label>Subject*</label>
<select name="subject" required>
<option value="">Select subject</option>
<option>Support</option>
<option>Feedback</option>
<option>Bug Report</option>
</select>
</div>

<div class="form-group">
<label>Message*</label>
<textarea name="message" placeholder="Write your message" required></textarea>
</div>

<div class="terms">
<input type="checkbox" required> I accept 
<a href="/terms.html">Terms</a> & 
<a href="/privacy.html">Privacy</a>
</div>

<button type="submit">Send Message</button>

</form>

</div>

</div>

</div>
