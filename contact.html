<link rel="stylesheet" href="style.css">

<style>

/* SAME STYLE (COPY SAME FROM ABOVE) */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #020617;
    color: #fff;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #020617;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
    font-weight: bold;
    color: #22c55e;
}

.header a {
    margin-left: 20px;
    text-decoration: none;
    color: #cbd5f5;
}

.header a:hover {
    color: #22c55e;
}

.content {
    max-width: 900px;
    margin: auto;
    padding: 60px 20px;
}

h1 {
    font-size: 32px;
    margin-bottom: 20px;
}

p {
    color: #94a3b8;
    line-height: 1.6;
}

/* CONTACT BOX */
.contact-box {
    background: #0f172a;
    padding: 40px;
    border-radius: 12px;
    margin-top: 30px;
}

footer {
    text-align: center;
    padding: 30px;
    background: #020617;
    border-top: 1px solid rgba(255,255,255,0.05);
}

footer a {
    color: #94a3b8;
    margin: 0 10px;
    text-decoration: none;
}

footer a:hover {
    color: #22c55e;
}
/* NAV */
.nav {
display: flex;
}

/* HAMBURGER */
.menu-toggle {
display: none;
font-size: 24px;
cursor: pointer;
color: white;
}

/* MOBILE */
@media (max-width: 768px) {

.nav {
display: none;
flex-direction: column;
position: absolute;
top: 60px;
right: 20px;
background: #020617;
padding: 15px;
border-radius: 10px;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
transition: all 0.3s ease;
}

.nav a {
margin: 10px 0;
}

.menu-toggle {
display: block;
}

.nav.active {
display: flex;
}

</style>

</head>

<div class="header">
